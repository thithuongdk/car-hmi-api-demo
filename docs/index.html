<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAN-HMI API - Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fafafa; }
    .app-header {
      background: #0f1117;
      color: #e2e8f0;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 2px solid #2e3248;
      font-family: "Inter", system-ui, sans-serif;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .app-header .logo { font-size: 17px; font-weight: 700; }
    .app-header .tag {
      font-size: 10px;
      background: #232635;
      border: 1px solid #2e3248;
      padding: 2px 8px;
      border-radius: 4px;
      color: #6b7280;
    }
    .app-header nav { margin-left: auto; display: flex; gap: 20px; align-items: center; }
    .app-header nav a { color: #4f8ef7; font-size: 13px; text-decoration: none; }
    .app-header nav a:hover { text-decoration: underline; }
    .swagger-ui .topbar { display: none; }
    .swagger-ui .information-container.wrapper { padding: 20px 30px 0; }
    .swagger-ui .scheme-container { padding: 10px 30px; }
  </style>
</head>
<body>

<header class="app-header">
  <span class="logo">&#x1F697; CAN-HMI</span>
  <span class="tag">API v1.0</span>
  <nav>
    <a href="/">&#8592; Demo</a>
    <a href="/ws">WebSocket Docs &#8599;</a>
    <a href="/docs/errors">Error Codes &#8599;</a>
    <a href="../gauss_demo.html">Gaussian Chart &#8599;</a>
  </nav>
</header>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
<script>
window.onload = function () {
  const spec = {
    openapi: "3.0.3",
    info: {
      title: "CAN-HMI REST API",
      description: "REST + WebSocket API contract for the Car HMI demo.\n\n**WebSocket realtime stream:** `wss://car-hmi-api-demo.onrender.com/ws/signals` — see [WebSocket Docs](/ws).\n\n**Subscribe to signals after connect:**\n```\n{ type: 'subscribe', signals: ['ACR_FL_RetractRequest', 'OMS_FL_HandsOnWheel'] }\n← { type: 'subscribed', signals: [...], count: 2 }  + snapshot\n\n{ type: 'subscribe', signals: '*' }   // all 167 signals\n{ type: 'ping' }  →  { type: 'pong' }\n```\n\n**Cross-tab write broadcast:** REST writes (`PUT /signals/:name`, `POST /signals/batch_update`) are immediately pushed to all subscribed WS clients.\n\n---\n\n### HTTP Status Codes\n\n| HTTP | App Code | ID | Description |\n|------|----------|----|-------------|\n| `200 OK` | - | - | Success |\n| `201 Created` | - | - | Profile created (POST /api/profile) |\n| `202 Accepted` | - | - | Signal write queued for CAN |\n| `204 No Content` | - | - | DELETE successful |\n| `400 Bad Request` | `3001` `3002` | VAL_INVALID_JSON / VAL_MISSING_FIELD | Invalid JSON / missing field |\n| `401 Unauthorized` | `4001` | SEC_UNAUTHORIZED | Invalid API key |\n| `403 Forbidden` | `4002` `4004` | SAFE_WRITE_DENIED / SAFE_VEHICLE_MOVING | Signal read-only / vehicle moving |\n| `404 Not Found` | `3004` | VAL_NOT_FOUND | Resource not found |\n| `409 Conflict` | `3005` | VAL_CONFLICT | Duplicate name / section_id mismatch |\n| `422 Unprocessable` | `3003` | VAL_OUT_OF_RANGE | Value outside [min, max] |\n| `500 Server Error` | `1000` `4003` | SYS_UNKNOWN / SAFE_WATCHDOG_TRIP | Internal server error |\n| `503 Unavailable` | `1001` `2001` | SYS_DB_LOCKED / HW_CAN_0_ERROR | DB locked / hardware error |\n| `504 Timeout` | `2002` | HW_CAN_1_ERROR | CAN1 bus communication timeout |\n\nSee full reference at **[Error Codes Reference](/docs/errors)**.\n\n---\n\n### section_id (Optimistic Locking)\nEvery PUT request must include `section_id` matching the current server value.\nIf mismatched → **409 / VAL_CONFLICT** → client must GET again and retry.",
      version: "1.0.0",
      contact: { url: "https://car-hmi-api-demo.onrender.com" }
    },
    servers: [
      { url: "https://car-hmi-api-demo.onrender.com", description: "Production (Render)" },
      { url: "http://localhost:8000",        description: "Local Dev" }
    ],
    tags: [
      { name: "System",   description: "Project info and system metadata (read-only)" },
      { name: "Profiles", description: "User profile management - which signals to show per user" },
      { name: "Config",   description: "System configuration: sampling rate, RTSP/WebRTC URLs. Dev mode only." },
      { name: "Signals",     description: "Read CAN signal values and write writable signals" },
      { name: "Restraints",  description: "Restraint system video matching based on live occupant data (weight, seat position) and crash pulse" }
    ],
    paths: {
      "/api/info": {
        get: {
          tags: ["System"],
          summary: "Get project & system information",
          description: "Returns read-only metadata: project version, server config, hardware settings, storage and safety thresholds. Sensitive fields (api_key) are redacted.",
          operationId: "getInfo",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/SystemInfo" },
                  example: {
                    project: { name: "CarPC HMI System", version: "1.2.0", environment: "development" },
                    server: { host: "0.0.0.0", port: 8000, api_key: "[REDACTED]", cors_origins: ["http://localhost:3000"], websocket: { endpoint: "/ws/signals", broadcast_interval_ms: 100 } },
                    hardware: { can_bus: { interface: "vcan0", bitrate: 500000, retry_limit: 3, rate_limit_ms: 100 } },
                    storage: { log_level: "DEBUG", retention_days: 30 },
                    safety: { speed_limit_max: 200, temp_threshold_critical: 105, write_access_enabled: true }
                  }
                }
              }
            },
            "503": { description: "Service Unavailable - info not loaded yet", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        }
      },
      "/api/profiles": {
        get: {
          tags: ["Profiles"],
          summary: "List all profiles",
          description: "Returns all stored user profiles.",
          operationId: "getProfiles",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/ProfilesResponse" },
                  example: {
                    section_id: 123,
                    profiles: [
                      { profile_name: "U0", signals: ["ARS_FL_InjuryRiskAdaptive","OMS_FL_HandsOnWheel","ACR_FL_RetractRequest"], selected: true },
                      { profile_name: "U1", signals: ["ARS_FL_InjuryRiskAdaptive","SMA_VehicleStable"], selected: false }
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "/api/profile": {
        get: {
          tags: ["Profiles"],
          summary: "Get profile by name (or active profile)",
          operationId: "getProfile",
          parameters: [
            { name: "name", in: "query", required: false,
              description: "Profile name. Leave empty to get the active profile.",
              schema: { type: "string", example: "U0" } }
          ],
          responses: {
            "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/ProfileResponse" } } } },
            "404": { description: "Not found", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        },
        post: {
          tags: ["Profiles"],
          summary: "Create new profile",
          operationId: "createProfile",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/ProfileCreate" },
                example: { profile_name: "U2", signals: ["ARS_FL_InjuryRiskAdaptive","ACR_FL_RetractRequest"], selected: false }
              }
            }
          },
          responses: {
            "201": { description: "Created", content: { "application/json": { schema: { $ref: "#/components/schemas/ProfileResponse" } } } },
            "409": { description: "Profile name already exists", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        },
        put: {
          tags: ["Profiles"],
          summary: "Update profile (optimistic lock)",
          description: "Requires `section_id` matching the current server value.",
          operationId: "updateProfile",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/ProfileUpdate" },
                example: { section_id: 123, profile_name: "U0", signals: ["ARS_FL_InjuryRiskAdaptive","OMS_FL_HandsOnWheel","ACR_FL_RetractRequest"], selected: true }
              }
            }
          },
          responses: {
            "200": { description: "Updated", content: { "application/json": { schema: { $ref: "#/components/schemas/ProfileResponse" } } } },
            "409": { description: "section_id mismatch", content: { "application/json": { schema: { $ref: "#/components/schemas/ConflictError" } } } }
          }
        }
      },
      "/api/profile/{name}": {
        delete: {
          tags: ["Profiles"],
          summary: "Delete profile",
          operationId: "deleteProfile",
          parameters: [
            { name: "name", in: "path", required: true, schema: { type: "string" }, example: "U0" }
          ],
          responses: {
            "204": { description: "Deleted (no body)" },
            "404": { description: "Not found", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        }
      },
      "/configs": {
        get: {
          tags: ["Config"],
          summary: "Get full system info (Dev mode)",
          operationId: "getConfigs",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/ConfigsResponse" },
                  example: {
                    section_id: 123,
                    configs: [
                      { config_name: "high_load", sampling_rate: 100, RTSP_url: "rtsp://example.com/stream", WebRTC_url: "", db_file: ["~/zf.dbc","~/mec.dbc"], selected: true },
                      { config_name: "low_load",  sampling_rate: 10,  RTSP_url: "", WebRTC_url: "", db_file: [], selected: false }
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "/config": {
        get: {
          tags: ["Config"],
          summary: "Get editable config (Dev mode)",
          operationId: "getConfig",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/ConfigResponse" },
                  example: { section_id: 123, config_name: "high_load", sampling_rate: 100, RTSP_url: "rtsp://example.com/stream", WebRTC_url: "", db_file: ["~/zf.dbc","~/mec.dbc"], selected: true }
                }
              }
            }
          }
        },
        put: {
          tags: ["Config"],
          summary: "Update editable config (optimistic lock, Dev mode)",
          description: "Requires `section_id` matching the current server value.",
          operationId: "updateConfig",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/ConfigUpdate" },
                example: { section_id: 123, config_name: "high_load", sampling_rate: 50, RTSP_url: "rtsp://example.com/stream", WebRTC_url: "", db_file: ["~/zf.dbc"], selected: true }
              }
            }
          },
          responses: {
            "200": { description: "Updated", content: { "application/json": { schema: { $ref: "#/components/schemas/ConfigResponse" } } } },
            "409": { description: "section_id mismatch", content: { "application/json": { schema: { $ref: "#/components/schemas/ConflictError" } } } }
          }
        }
      },
      "/signals": {
        get: {
          tags: ["Signals"],
          summary: "Current snapshot of all signal values",
          description: "One-time snapshot. Use for initial load; then use **WebSocket** `/ws/signals` for realtime updates.",
          operationId: "getSignals",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/SignalsSnapshot" },
                  example: {
                    timestamp: "2024-06-01T12:00:00.123Z",
                    signals: [
                      { name: "ARS_FL_InjuryRiskAdaptive",      value: 23,   timestamp: 1717243200.123 },
                      { name: "ARS_FL_TimeToFireAirbag",        value: 1500, timestamp: 1717243200.123 },
                      { name: "OMS_FL_HandsOnWheel",            value: 3,    timestamp: 1717243200.123 },
                      { name: "OMS_FL_OccupantWeightMean_kg",   value: 72,   timestamp: 1717243200.123 },
                      { name: "ACR_FL_RetractRequest",          value: 0,    timestamp: 1717243200.123 },
                      { name: "ACR_FR_RetractRequest",          value: 0,    timestamp: 1717243200.123 },
                      { name: "HMI_CrashSeverity",             value: 0,    timestamp: 1717243200.123 }
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "/signals/available": {
        get: {
          tags: ["Signals"],
          summary: "Full metadata for all signals",
          description: "Returns full metadata: unit, min, max, writable flag, states enum, current value. Call **once** on app startup.",
          operationId: "getSignalsAvailable",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/SignalsAvailableResponse" },
                  example: {
                    signals_info: [
                      { name: "ARS_FL_InjuryRiskAdaptive",    unit: "",  min: 0, max: 100,  writable: false, description: "FL airbag injury risk adaptive",   states: [], value: 23  },
                      { name: "OMS_FL_HandsOnWheel",          unit: "",  min: 0, max: 7,    writable: false, description: "FL occupant hands on wheel",       states: [{value:0,description:"No Hand"},{value:1,description:"One Hand"},{value:2,description:"Two Hands"},{value:3,description:"Hands Near"},{value:4,description:"Unknown"}], value: 3 },
                      { name: "OMS_FL_OccupantWeightMean_kg", unit: "",  min: 0, max: 255,  writable: false, description: "FL occupant weight mean (kg)",      states: [], value: 72  },
                      { name: "SMA_VehicleStable",            unit: "",  min: 0, max: 1,    writable: false, description: "Vehicle stability flag",           states: [], value: 1   },
                      { name: "ACR_FL_RetractRequest",        unit: "",  min: 0, max: 255,  writable: true,  description: "FL ACR retract request",          states: [{value:0,description:"No Action"},{value:1,description:"Slack Removal"},{value:2,description:"Retract Level 1"},{value:3,description:"Retract Level 2"}], value: 0 },
                      { name: "ACR_FR_RetractRequest",        unit: "",  min: 0, max: 255,  writable: true,  description: "FR ACR retract request",          states: [{value:0,description:"No Action"},{value:1,description:"Slack Removal"},{value:2,description:"Retract Level 1"},{value:3,description:"Retract Level 2"}], value: 0 },
                      { name: "HMI_CrashSeverity",           unit: "",  min: 0, max: 7,    writable: true,  description: "HMI crash severity command",      states: [], value: 0   }
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "/signals/batch_update": {
        post: {
          tags: ["Signals"],
          summary: "Write multiple writable signals simultaneously (batch)",
          description: "Bulk write — sync multiple writable signals in a single request.",
          operationId: "batchUpdateSignals",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/BatchSignalWrite" },
                example: {
                  timestamp: "2024-06-01T12:00:00Z",
                  updates: [
                    { name: "ACR_FL_RetractRequest", value: 2 },
                    { name: "ACR_FR_RetractRequest", value: 2 }
                  ]
                }
              }
            }
          },
          responses: {
            "202": {
              description: "Accepted — all signals queued for CAN write",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/BatchSignalWriteAccepted" },
                  example: { status: "queued", count: 2, results: [ { name: "ACR_FL_RetractRequest", value: 2, status: "ok" }, { name: "ARS_FL_InjuryRiskAdaptive", value: 1, status: "not_writable" } ] }
                }
              }
            },
            "400": { description: "Bad Request — missing `updates` field or invalid format", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        }
      },
      "/signals/{signal_name}": {
        put: {
          tags: ["Signals"],
          summary: "Write a value to a writable signal",
          description: "Forwarded to CAN writer. Only applies to signals with `writable: true`.",
          operationId: "updateSignal",
          parameters: [
            { name: "signal_name", in: "path", required: true,
              schema: { type: "string", enum: ["ACR_FL_RetractRequest","ACR_FR_RetractRequest","ABL_FL_RetractRequest","HMI_CrashSeverity","Generic_SeatFunctionEnable"] },
              example: "ACR_FL_RetractRequest" }
          ],
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/SignalWrite" },
                example: { timestamp: "2024-06-01T12:00:00Z", name: "ACR_FL_RetractRequest", value: 2 }
              }
            }
          },
          responses: {
            "202": { description: "Accepted - signal queued for CAN write", content: { "application/json": { schema: { $ref: "#/components/schemas/SignalWriteAccepted" }, example: { signal_name: "ACR_FL_RetractRequest", value: 2, queued_at: 1717243200.123 } } } },
            "403": { description: "Forbidden - signal is read-only (TX: false)", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" }, example: { error: "Not writable" } } } },
            "404": { description: "Signal not found",             content: { "application/json": { schema: { $ref: "#/components/schemas/Error" }, example: { error: "Not found" } } } }
          }
        }
      },
      "/api/restraints/match": {
        get: {
          tags: ["Restraints"],
          summary: "Match restraint video for a seat",
          description: "Returns the best-matching video file based on live occupant signals and the specified crash pulse.\n\n**Seat → signal suffix mapping:**\n\n| seat | suffix | Signals used |\n|------|--------|-------------|\n| driver | FL | OMS_FL_OccupantWeightMean_kg, SPS_FL_SeatDirectionX, ARS_FL_InjuryRiskAdaptive |\n| passenger | FR | OMS_FR_OccupantWeightMean_kg, SPS_FR_SeatDirectionX, ARS_FR_InjuryRiskAdaptive |\n| rear_left/right/center | R1/R2/RR1 | no OMS/SPS → defaults applied |\n\n**Percentile (from weight):** ≤ 50 kg → `5p` · 51–80 kg → `50p` · > 80 kg → `95p`\n\n**Seat position (SPS_SeatDirectionX, 0–4095 mm):** < 1365 → `fwd` · 1365–2729 → `mid` · ≥ 2730 → `bwd`\n\n**Score** = ARS injury risk (0–100) ÷ 20 → range 0.0–5.0",
          operationId: "matchRestraints",
          parameters: [
            { name: "seat",        in: "query", required: true,  description: "Seat position",
              schema: { type: "string", enum: ["driver","passenger","rear_left","rear_right","rear_center"] },
              example: "driver" },
            { name: "seat_belt",   in: "query", required: true,  description: "Seatbelt type",
              schema: { type: "string", enum: ["CLL","SLL","MSLL"] },
              example: "SLL" },
            { name: "crash_pulse", in: "query", required: false, description: "Crash pulse scenario (default: OLC18)",
              schema: { type: "string", enum: ["OLC18","OLC30"], default: "OLC18" },
              example: "OLC18" }
          ],
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/RestraintsMatchResponse" },
                  example: {
                    matched: true,
                    video: {
                      filename: "50p_mid_56_SLL.mp4",
                      percentile: 50,
                      seat_position: "mid",
                      weight: 56,
                      seat_belt: "SLL",
                      url: "/api/restraints/video/50p_mid_56_SLL.mp4"
                    },
                    score: 2.5
                  }
                }
              }
            },
            "400": { description: "Missing required parameter (seat or seat_belt)", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" }, example: { error: "seat is required", code: 3002, id: "VAL_MISSING_FIELD" } } } },
            "422": { description: "Invalid seat / seat_belt / crash_pulse value",   content: { "application/json": { schema: { $ref: "#/components/schemas/Error" }, example: { error: "Unknown seat_belt 'ACR'. Valid: CLL, SLL, MSLL", code: 3003, id: "VAL_OUT_OF_RANGE" } } } }
          }
        }
      }
    },
    components: {
      schemas: {
        SystemInfo: {
          type: "object",
          description: "Project and system metadata. Sensitive fields are redacted.",
          properties: {
            project:  { type: "object", properties: { name: { type: "string" }, version: { type: "string" }, environment: { type: "string" } } },
            server:   { type: "object", properties: { host: { type: "string" }, port: { type: "integer" }, api_key: { type: "string", example: "[REDACTED]" }, cors_origins: { type: "array", items: { type: "string" } }, websocket: { type: "object", properties: { endpoint: { type: "string" }, broadcast_interval_ms: { type: "integer" } } } } },
            hardware: { type: "object", properties: { can_bus: { type: "object", properties: { interface: { type: "string" }, bitrate: { type: "integer" }, retry_limit: { type: "integer" }, rate_limit_ms: { type: "integer" } } }, xcp: { type: "object" } } },
            storage:  { type: "object", properties: { db_path: { type: "string" }, log_level: { type: "string" }, retention_days: { type: "integer" } } },
            safety:   { type: "object", properties: { speed_limit_max: { type: "number" }, temp_threshold_critical: { type: "number" }, write_access_enabled: { type: "boolean" } } },
            video:    { type: "object" }
          }
        },
        Profile: {
          type: "object",
          properties: {
            profile_name: { type: "string",  example: "U0" },
            signals:      { type: "array", items: { type: "string" }, example: ["ARS_FL_InjuryRiskAdaptive","OMS_FL_HandsOnWheel"] },
            selected:     { type: "boolean", example: false }
          }
        },
        ProfileResponse: {
          type: "object",
          properties: {
            section_id:   { type: "integer", example: 123 },
            profile_name: { type: "string",  example: "U0" },
            signals:      { type: "array", items: { type: "string" }, example: ["ARS_FL_InjuryRiskAdaptive","OMS_FL_HandsOnWheel"] },
            selected:     { type: "boolean", example: true }
          }
        },
        ProfilesResponse: {
          type: "object",
          properties: {
            section_id: { type: "integer", example: 123 },
            profiles:   { type: "array",   items: { $ref: "#/components/schemas/Profile" } }
          }
        },
        ProfileCreate: {
          type: "object",
          required: ["profile_name"],
          properties: {
            profile_name: { type: "string" },
            signals:      { type: "array", items: { type: "string" } },
            selected:     { type: "boolean", default: false }
          }
        },
        ProfileUpdate: {
          type: "object",
          required: ["section_id","profile_name"],
          properties: {
            section_id:   { type: "integer", description: "Must match the current server section_id" },
            profile_name: { type: "string" },
            signals:      { type: "array", items: { type: "string" } },
            selected:     { type: "boolean" }
          }
        },
        Config: {
          type: "object",
          properties: {
            config_name:   { type: "string",  example: "high_load" },
            sampling_rate: { type: "integer", description: "Samples per second", example: 100 },
            RTSP_url:      { type: "string",  example: "rtsp://example.com/stream" },
            WebRTC_url:    { type: "string",  example: "" },
            db_file:       { type: "array", items: { type: "string" }, example: ["~/zf.dbc","~/mec.dbc"] },
            selected:      { type: "boolean", example: true }
          }
        },
        ConfigResponse: {
          type: "object",
          properties: {
            section_id:    { type: "integer", example: 123 },
            config_name:   { type: "string",  example: "high_load" },
            sampling_rate: { type: "integer", example: 100 },
            RTSP_url:      { type: "string",  example: "rtsp://example.com/stream" },
            WebRTC_url:    { type: "string",  example: "" },
            db_file:       { type: "array", items: { type: "string" }, example: ["~/zf.dbc"] },
            selected:      { type: "boolean", example: true }
          }
        },
        ConfigsResponse: {
          type: "object",
          properties: {
            section_id: { type: "integer", example: 123 },
            configs:    { type: "array",   items: { $ref: "#/components/schemas/Config" } }
          }
        },
        ConfigUpdate: {
          type: "object",
          required: ["section_id"],
          properties: {
            section_id:    { type: "integer", description: "Must match the current server section_id" },
            config_name:   { type: "string" },
            sampling_rate: { type: "integer" },
            RTSP_url:      { type: "string" },
            WebRTC_url:    { type: "string" },
            db_file:       { type: "array", items: { type: "string" } },
            selected:      { type: "boolean" }
          }
        },
        SignalState: {
          type: "object",
          properties: {
            value:       { type: "integer", example: 0 },
            description: { type: "string",  example: "Level 1" }
          }
        },
        SignalMeta: {
          type: "object",
          properties: {
            name:        { type: "string",  example: "ARS_FL_InjuryRiskAdaptive" },
            unit:        { type: "string",  example: "rpm" },
            min:         { type: "number",  example: 0 },
            max:         { type: "number",  example: 8000 },
            writable:    { type: "boolean", example: false },
            description: { type: "string",  example: "Engine speed in RPM" },
            states:      { type: "array",   items: { $ref: "#/components/schemas/SignalState" }, description: "Non-empty for enum/discrete signals" },
            value:       { type: "number",  nullable: true, description: "Current value (null if unavailable)", example: 3000 }
          }
        },
        SignalValue: {
          type: "object",
          properties: {
            name:      { type: "string", example: "ARS_FL_InjuryRiskAdaptive" },
            value:     { type: "number", example: 3000 },
            timestamp: { type: "number", description: "Unix epoch seconds", example: 1717243200.123 }
          }
        },
        SignalsSnapshot: {
          type: "object",
          properties: {
            timestamp: { type: "string", format: "date-time", example: "2024-06-01T12:00:00.123Z" },
            signals:   { type: "array",  items: { $ref: "#/components/schemas/SignalValue" } }
          }
        },
        SignalsAvailableResponse: {
          type: "object",
          properties: {
            signals_info: { type: "array", items: { $ref: "#/components/schemas/SignalMeta" } }
          }
        },
        SignalWrite: {
          type: "object",
          required: ["name","value"],
          properties: {
            timestamp: { type: "string", format: "date-time" },
            name:      { type: "string", example: "ACR_FL_RetractRequest" },
            value:     { type: "number", example: 2 }
          }
        },
        BatchSignalWrite: {
          type: "object",
          required: ["updates"],
          properties: {
            timestamp: { type: "string", format: "date-time" },
            updates: {
              type: "array",
              items: {
                type: "object",
                properties: {
                  name:  { type: "string", example: "ACR_FL_RetractRequest" },
                  value: { type: "number", example: 2 }
                }
              }
            }
          }
        },
        Error: {
          type: "object",
          required: ["error"],
          properties: {
            error: { type: "string", example: "Signal 'X' not found" },
            code:  { type: "integer", example: 3004, description: "App-level error code (10xx System, 20xx Hardware, 30xx Validation, 40xx Safety/Security)" },
            id:    { type: "string",  example: "VAL_NOT_FOUND", description: "Human-readable error ID for logging and switch-case" }
          }
        },
        SignalWriteAccepted: {
          type: "object",
          properties: {
            signal_name: { type: "string",  example: "ACR_FL_RetractRequest" },
            value:       { type: "number",  example: 2 },
            queued_at:   { type: "number",  description: "Unix epoch seconds", example: 1717243200.123 }
          }
        },
        BatchSignalWriteAccepted: {
          type: "object",
          properties: {
            status:  { type: "string",  example: "queued" },
            count:   { type: "integer", example: 2 },
            results: { type: "array", items: {
              type: "object",
              properties: {
                name:   { type: "string", example: "ACR_FL_RetractRequest" },
                value:  { type: "number", example: 2 },
                status: { type: "string", enum: ["ok","not_writable","not_found","out_of_range"], example: "ok" }
              }
            }}
          }
        },
        RestraintsMatchResponse: {
          type: "object",
          properties: {
            matched: { type: "boolean", example: true },
            video:   { $ref: "#/components/schemas/VideoMatch" },
            score:   { type: "number",  description: "0.0–5.0, derived from ARS injury risk (0–100 ÷ 20)", example: 2.5 }
          }
        },
        VideoMatch: {
          type: "object",
          properties: {
            filename:      { type: "string",  description: "Constructed as {percentile}p_{seat_position}_{weight}_{seat_belt}.mp4", example: "50p_mid_56_SLL.mp4" },
            percentile:    { type: "integer", enum: [5, 50, 95], description: "Occupant percentile: 5th (≤50 kg), 50th (51–80 kg), 95th (>80 kg)", example: 50 },
            seat_position: { type: "string",  enum: ["fwd","mid","bwd"], description: "Fore-aft seat position from SPS_SeatDirectionX", example: "mid" },
            weight:        { type: "integer", description: "Occupant weight (kg) from OMS signal", example: 56 },
            seat_belt:     { type: "string",  enum: ["CLL","SLL","MSLL"], example: "SLL" },
            url:           { type: "string",  description: "URL path to retrieve the video file", example: "/api/restraints/video/50p_mid_56_SLL.mp4" }
          }
        },
        ConflictError: {
          type: "object",
          properties: {
            error:              { type: "string",  example: "section_id mismatch: expected 124, got 123" },
            current_section_id: { type: "integer", example: 124 }
          }
        }
      }
    }
  };

  SwaggerUIBundle({
    spec,
    dom_id: "#swagger-ui",
    deepLinking: true,
    presets: [
      SwaggerUIBundle.presets.apis,
      SwaggerUIStandalonePreset
    ],
    plugins: [SwaggerUIBundle.plugins.DownloadUrl],
    layout: "StandaloneLayout",
    tryItOutEnabled: false,
    defaultModelsExpandDepth: 1,
    defaultModelExpandDepth: 2
  });
};
</script>
</body>
</html>
