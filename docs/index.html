<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAN-HMI API - Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fafafa; }
    .app-header {
      background: #0f1117;
      color: #e2e8f0;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 2px solid #2e3248;
      font-family: "Inter", system-ui, sans-serif;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .app-header .logo { font-size: 17px; font-weight: 700; }
    .app-header .tag {
      font-size: 10px;
      background: #232635;
      border: 1px solid #2e3248;
      padding: 2px 8px;
      border-radius: 4px;
      color: #6b7280;
    }
    .app-header nav { margin-left: auto; display: flex; gap: 20px; align-items: center; }
    .app-header nav a { color: #4f8ef7; font-size: 13px; text-decoration: none; }
    .app-header nav a:hover { text-decoration: underline; }
    .swagger-ui .topbar { display: none; }
    .swagger-ui .information-container.wrapper { padding: 20px 30px 0; }
    .swagger-ui .scheme-container { padding: 10px 30px; }
  </style>
</head>
<body>

<header class="app-header">
  <span class="logo">&#x1F697; CAN-HMI</span>
  <span class="tag">API v1.0</span>
  <nav>
    <a href="/">&#8592; Demo</a>
    <a href="/ws">WebSocket Docs &#8599;</a>
    <a href="/docs/errors">Error Codes &#8599;</a>
    <a href="../gauss_demo.html">Gaussian Chart &#8599;</a>
  </nav>
</header>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
<script>
window.onload = function () {
  const spec = {
    openapi: "3.0.3",
    info: {
      title: "CAN-HMI REST API",
      description: "REST + WebSocket API contract for the Car HMI demo.\n\n**WebSocket realtime stream:** `wss://car-hmi-api-demo.onrender.com/ws/signals` — see [WebSocket Docs](/ws).\n\n**Signal Alias (`std_name`):** Mọi REST write, batch update, và WebSocket subscribe/unsubscribe đều chấp nhận cả `name` (signal_name gốc trong CAN DB) **và** `std_name` (tên chuẩn hóa từ `data/signal_std_name.json`). Response signals trả về cặp canonical + std_name (`signal_name` trong REST snapshot, `name` trong WS frame).\n\n**Subscribe to signals after connect:**\n```\n{ type: 'subscribe', signals: ['ACR_FL_RetractRequest', 'OMS_FL_HandsOnWheel'] }\n← { type: 'subscribed', signals: [...], count: 2 }  + snapshot\n\n{ type: 'subscribe', signals: '*' }   // all 167 signals\n{ type: 'subscribe', signals: ['OMS_FL_OccupantWeightMean', 'OMS_RL1_SeatbeltMisuse'] }  // bằng std_name\n{ type: 'ping' }  →  { type: 'pong' }\n```\n\n**Cross-tab write broadcast:** REST writes (`PUT /signals/:name`, `POST /signals/batch_update`) are immediately pushed to all subscribed WS clients.\n\n---\n\n### HTTP Status Codes\n\n| HTTP | App Code | ID | Description |\n|------|----------|----|-------------|\n| `200 OK` | - | - | Success |\n| `201 Created` | - | - | Profile created (POST /api/profile) |\n| `202 Accepted` | - | - | Signal write queued for CAN |\n| `204 No Content` | - | - | DELETE successful |\n| `400 Bad Request` | `3001` `3002` | VAL_INVALID_JSON / VAL_MISSING_FIELD | Invalid JSON / missing field |\n| `401 Unauthorized` | `4001` | SEC_UNAUTHORIZED | Invalid API key |\n| `403 Forbidden` | `4002` `4004` | SAFE_WRITE_DENIED / SAFE_VEHICLE_MOVING | Signal read-only / vehicle moving |\n| `404 Not Found` | `3004` | VAL_NOT_FOUND | Resource not found |\n| `409 Conflict` | `3005` | VAL_CONFLICT | Duplicate name / section_id mismatch |\n| `422 Unprocessable` | `3003` | VAL_OUT_OF_RANGE | Value outside [min, max] |\n| `500 Server Error` | `1000` `4003` | SYS_UNKNOWN / SAFE_WATCHDOG_TRIP | Internal server error |\n| `503 Unavailable` | `1001` `2001` | SYS_DB_LOCKED / HW_CAN_0_ERROR | DB locked / hardware error |\n| `504 Timeout` | `2002` | HW_CAN_1_ERROR | CAN1 bus communication timeout |\n\nSee full reference at **[Error Codes Reference](/docs/errors)**.\n\n---\n\n### section_id (Optimistic Locking)\nEvery PUT request must include `section_id` matching the current server value.\nIf mismatched → **409 / VAL_CONFLICT** → client must GET again and retry.",
      version: "1.0.0",
      contact: { url: "https://car-hmi-api-demo.onrender.com" }
    },
    servers: [
      { url: "https://car-hmi-api-demo.onrender.com", description: "Production (Render)" },
      { url: "http://localhost:8000",        description: "Local Dev" }
    ],
    tags: [
      { name: "System",   description: "Project info and system metadata (read-only)" },
      { name: "Profiles", description: "User profile management - which signals to show per user" },
      { name: "Config",   description: "System configuration: sampling rate, RTSP/WebRTC URLs. Dev mode only." },
      { name: "Signals",     description: "Read CAN signal values and write writable signals" },
      { name: "Restraints",  description: "Restraint system video matching based on live occupant data (weight, seat position) and crash pulse" }
    ],
    paths: {
      "/api/info": {
        get: {
          tags: ["System"],
          summary: "Get project & system information",
          description: "Returns read-only metadata: project version, server config, hardware settings, storage and safety thresholds. Sensitive fields (api_key) are redacted.",
          operationId: "getInfo",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/SystemInfo" },
                  example: {
                    project: { name: "CarPC HMI System", version: "1.2.0", environment: "development" },
                    server: { host: "0.0.0.0", port: 8000, api_key: "[REDACTED]", cors_origins: ["http://localhost:3000"], websocket: { endpoint: "/ws/signals", broadcast_interval_ms: 100 } },
                    hardware: { can_bus: { interface: "vcan0", bitrate: 500000, retry_limit: 3, rate_limit_ms: 100 } },
                    storage: { log_level: "DEBUG", retention_days: 30 },
                    safety: { speed_limit_max: 200, temp_threshold_critical: 105, write_access_enabled: true }
                  }
                }
              }
            },
            "503": { description: "Service Unavailable - info not loaded yet", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        }
      },
      "/api/profiles": {
        get: {
          tags: ["Profiles"],
          summary: "List all profiles",
          description: "Returns all stored user profiles.",
          operationId: "getProfiles",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/ProfilesResponse" },
                  example: {
                    profiles: [
                      { name: "U0", signals: ["ARS_FL_InjuryRiskAdaptive","OMS_FL_HandsOnWheel","ACR_FL_RetractRequest"], permission: ["full"], description: "Front seat profile", section_id: "9ab1c2d3e4f5" },
                      { name: "U1", signals: ["ARS_FL_InjuryRiskAdaptive","SMA_VehicleStable"], permission: ["read"], description: "Rear seat profile", section_id: "9ab1c2d3e4f5" }
                    ],
                    total: 2,
                    active: "U0",
                    global_active: "U0",
                    client_id: "client-abc123"
                  }
                }
              }
            }
          }
        }
      },
      "/api/profile": {
        get: {
          tags: ["Profiles"],
          summary: "Get profile by name (or active profile)",
          operationId: "getProfile",
          parameters: [
            { name: "name", in: "query", required: false,
              description: "Profile name. Leave empty to get the active profile.",
              schema: { type: "string", example: "U0" } }
          ],
          responses: {
            "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/ProfileResponse" } } } },
            "404": { description: "Not found", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        },
        post: {
          tags: ["Profiles"],
          summary: "Create new profile",
          operationId: "createProfile",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/ProfileCreate" },
                example: { name: "U2", signals: ["ARS_FL_InjuryRiskAdaptive","ACR_FL_RetractRequest"], permission: ["read"], description: "Outside view" }
              }
            }
          },
          responses: {
            "201": { description: "Created", content: { "application/json": { schema: { $ref: "#/components/schemas/ProfileResponse" } } } },
            "409": { description: "Profile name already exists", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        },
        put: {
          tags: ["Profiles"],
          summary: "Update profile (optimistic lock)",
          description: "Requires `section_id` matching the current server value.",
          operationId: "updateProfile",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/ProfileUpdate" },
                example: { section_id: "9ab1c2d3e4f5", name: "U0", signals: ["ARS_FL_InjuryRiskAdaptive","OMS_FL_HandsOnWheel","ACR_FL_RetractRequest"], permission: ["full"], description: "Front seat profile" }
              }
            }
          },
          responses: {
            "200": { description: "Updated", content: { "application/json": { schema: { $ref: "#/components/schemas/ProfileResponse" } } } },
            "409": { description: "section_id mismatch", content: { "application/json": { schema: { $ref: "#/components/schemas/ConflictError" } } } }
          }
        }
      },
      "/api/profile/{name}": {
        delete: {
          tags: ["Profiles"],
          summary: "Delete profile",
          operationId: "deleteProfile",
          parameters: [
            { name: "name", in: "path", required: true, schema: { type: "string" }, example: "U0" }
          ],
          responses: {
            "204": { description: "Deleted (no body)" },
            "404": { description: "Not found", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        }
      },
      "/configs": {
        get: {
          tags: ["Config"],
          summary: "Get full system info (Dev mode)",
          operationId: "getConfigs",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/ConfigsResponse" },
                  example: {
                    section_id: 123,
                    configs: [
                      { config_name: "high_load", sampling_rate: 100, RTSP_url: "rtsp://example.com/stream", WebRTC_url: "", db_file: ["~/zf.dbc","~/mec.dbc"], selected: true },
                      { config_name: "low_load",  sampling_rate: 10,  RTSP_url: "", WebRTC_url: "", db_file: [], selected: false }
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "/config": {
        get: {
          tags: ["Config"],
          summary: "Get editable config (Dev mode)",
          operationId: "getConfig",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/ConfigResponse" },
                  example: { section_id: 123, config_name: "high_load", sampling_rate: 100, RTSP_url: "rtsp://example.com/stream", WebRTC_url: "", db_file: ["~/zf.dbc","~/mec.dbc"], selected: true }
                }
              }
            }
          }
        },
        put: {
          tags: ["Config"],
          summary: "Update editable config (optimistic lock, Dev mode)",
          description: "Requires `section_id` matching the current server value.",
          operationId: "updateConfig",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/ConfigUpdate" },
                example: { section_id: 123, config_name: "high_load", sampling_rate: 50, RTSP_url: "rtsp://example.com/stream", WebRTC_url: "", db_file: ["~/zf.dbc"], selected: true }
              }
            }
          },
          responses: {
            "200": { description: "Updated", content: { "application/json": { schema: { $ref: "#/components/schemas/ConfigResponse" } } } },
            "409": { description: "section_id mismatch", content: { "application/json": { schema: { $ref: "#/components/schemas/ConflictError" } } } }
          }
        }
      },
      "/signals": {
        get: {
          tags: ["Signals"],
          summary: "Current snapshot of all signal values",
          description: "One-time snapshot. Use for initial load; then use **WebSocket** `/ws/signals` for realtime updates. Each signal now includes `std_name` (standardized name alias from `signal_std_name.json`).",
          operationId: "getSignals",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/SignalsSnapshot" },
                  example: {
                    items: [
                      { signal_name: "ARS_FL_InjuryRiskAdaptive",    std_name: "ARS_FL_InjuryRiskAdaptive",  value: 23,   unit: "", timestamp: 1717243200.123 },
                      { signal_name: "OMS_FL_HandsOnWheel",          std_name: "OMS_FL_HandsOnWheel",        value: 3,    unit: "", timestamp: 1717243200.123 },
                      { signal_name: "OMS_FL_OccupantWeightMean_kg", std_name: "OMS_FL_OccupantWeightMean",  value: 72,   unit: "", timestamp: 1717243200.123 },
                      { signal_name: "ACR_FL_RetractRequest",        std_name: "ACR_FL_RetractRequest",      value: 0,    unit: "", timestamp: 1717243200.123 }
                    ],
                    total: 4,
                    warnings: []
                  }
                }
              }
            }
          }
        }
      },
      "/signals/available": {
        get: {
          tags: ["Signals"],
          summary: "Full metadata for all signals",
          description: "Returns full metadata: unit, min, max, writable flag, states enum, current value. Call **once** on app startup.",
          operationId: "getSignalsAvailable",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/SignalsAvailableResponse" },
                  example: {
                    signals_info: [
                      { name: "ARS_FL_InjuryRiskAdaptive",    std_name: "ARS_FL_InjuryRiskAdaptive",    unit: "",  min: 0, max: 100,  writable: false, description: "FL airbag injury risk adaptive",   states: [], value: 23  },
                      { name: "OMS_FL_HandsOnWheel",          std_name: "OMS_FL_HandsOnWheel",          unit: "",  min: 0, max: 7,    writable: false, description: "FL occupant hands on wheel",       states: [{value:0,description:"No Hand"},{value:1,description:"One Hand"},{value:2,description:"Two Hands"},{value:3,description:"Hands Near"},{value:4,description:"Unknown"}], value: 3 },
                      { name: "OMS_FL_OccupantWeightMean_kg", std_name: "OMS_FL_OccupantWeightMean",     unit: "",  min: 0, max: 255,  writable: false, description: "FL occupant weight mean (kg)",      states: [], value: 72  },
                      { name: "SMA_VehicleStable",            std_name: "SMA_VehicleStable",            unit: "",  min: 0, max: 1,    writable: false, description: "Vehicle stability flag",           states: [], value: 1   },
                      { name: "ACR_FL_RetractRequest",        std_name: "ACR_FL_RetractRequest",        unit: "",  min: 0, max: 255,  writable: true,  description: "FL ACR retract request",          states: [{value:0,description:"No Action"},{value:1,description:"Slack Removal"},{value:2,description:"Retract Level 1"},{value:3,description:"Retract Level 2"}], value: 0 },
                      { name: "ACR_FR_RetractRequest",        std_name: "ACR_FR_RetractRequest",        unit: "",  min: 0, max: 255,  writable: true,  description: "FR ACR retract request",          states: [{value:0,description:"No Action"},{value:1,description:"Slack Removal"},{value:2,description:"Retract Level 1"},{value:3,description:"Retract Level 2"}], value: 0 },
                      { name: "HMI_CrashSeverity",           std_name: "HMI_CrashSeverity",           unit: "",  min: 0, max: 7,    writable: true,  description: "HMI crash severity command",      states: [], value: 0   }
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "/signals/batch_update": {
        post: {
          tags: ["Signals"],
          summary: "Write multiple writable signals simultaneously (batch)",
          description: "Bulk write — sync multiple writable signals in a single request. Each item can specify `name`, `signal_name`, **or** `std_name` to identify the signal.",
          operationId: "batchUpdateSignals",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/BatchSignalWrite" },
                example: {
                  signals: [
                    { signal_name: "EngineSpeed", value: 3500 },
                    { signal_name: "CoolantTemp", value: 90 }
                  ]
                }
              }
            }
          },
          responses: {
            "202": {
              description: "Accepted — all signals queued for CAN write",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/BatchSignalWriteAccepted" },
                  example: { queued: [ { signal_name: "EngineSpeed", value: 3500.0 }, { signal_name: "CoolantTemp", value: 90.0 } ], count: 2, queued_at: 1716451200.789, errors: [] }
                }
              }
            },
            "400": { description: "Bad Request — missing `signals` field or invalid format", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        }
      },
      "/signals/{signal_name}": {
        put: {
          tags: ["Signals"],
          summary: "Write a value to a writable signal",
          description: "Forwarded to CAN writer. Only applies to signals with `writable: true`. The path param `signal_name` chấp nhận cả `name` gốc hoặc `std_name`.",
          operationId: "updateSignal",
          parameters: [
            { name: "signal_name", in: "path", required: true,
              schema: { type: "string", enum: ["ACR_FL_RetractRequest","ACR_FR_RetractRequest","ABL_FL_RetractRequest","HMI_CrashSeverity","Generic_SeatFunctionEnable"] },
              example: "ACR_FL_RetractRequest" }
          ],
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/SignalWrite" },
                example: { timestamp: "2024-06-01T12:00:00Z", name: "ACR_FL_RetractRequest", value: 2 }
              }
            }
          },
          responses: {
            "202": { description: "Accepted - signal queued for CAN write", content: { "application/json": { schema: { $ref: "#/components/schemas/SignalWriteAccepted" }, example: { signal_name: "ACR_FL_RetractRequest", std_name: "ACR_FL_RetractRequest", value: 2, queued_at: 1717243200.123 } } } },
            "403": { description: "Forbidden - signal is read-only (TX: false)", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" }, example: { error: "Not writable" } } } },
            "404": { description: "Signal not found",             content: { "application/json": { schema: { $ref: "#/components/schemas/Error" }, example: { error: "Not found" } } } }
          }
        }
      },
      "/api/restraints/match": {
        get: {
          tags: ["Restraints"],
          summary: "Match restraint video using crash + occupant context",
          description: "Returns the best-matching video file parsed from media filename schema `{percentile}p_{seat_position}_{velocity}_{seatbelt}.ext`.\n\n**Seat mapping:** `fl` or `fr`\n\n**Percentile:** weight-derived (<65→5th, 65–90→50th, >90→95th) and overridden by CAN `OMS_*_OccupantClassification` when available.\n\n**Seat zone:** `seat_x_mm` (query) > CAN `SPS_*_SeatDirectionX` > default `mid` with thresholds: <56.75 front, <170.25 mid, else rear.\n\n**Velocity:** direct km/h (`35/40/50/56`) or OLC code (`OLC16/18/26/33`).\n\n**Scoring (max 7.0):** +3 seatbelt exact, +2 percentile exact, +1 seat zone exact, +0..1 nearest velocity.",
          operationId: "matchRestraints",
          parameters: [
            { name: "weight", in: "query", required: true, description: "Occupant weight (kg)",
              schema: { type: "number", format: "float", minimum: 1 }, example: 75 },
            { name: "height", in: "query", required: true, description: "Occupant height (cm)",
              schema: { type: "number", format: "float", minimum: 1 }, example: 175 },
            { name: "crash_severity", in: "query", required: true, description: "Crash severity as km/h or OLC code",
              schema: { type: "string", enum: ["35","40","50","56","OLC16","OLC18","OLC26","OLC33"] },
              example: "40" },
            { name: "seatbelt_system", in: "query", required: true, description: "Seatbelt system",
              schema: { type: "string", enum: ["CLL","SLL","MSLL"] },
              example: "SLL" },
            { name: "seat", in: "query", required: false, description: "Seat side",
              schema: { type: "string", enum: ["fl", "fr"], default: "fl" }, example: "fl" },
            { name: "seat_x_mm", in: "query", required: false, description: "Seat position in mm from SPS sensor (0-227)",
              schema: { type: "number", format: "float" }, example: 100 }
          ],
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/RestraintsMatchResponse" },
                  example: {
                    matched: true,
                    score: 6.952,
                    video: {
                      filename: "50p_mid_40_SLL.mp4",
                      percentile: 50,
                      seat_position: "mid",
                      velocity_kmh: 40,
                      seatbelt: "SLL",
                      url: "/api/restraints/video/50p_mid_40_SLL.mp4"
                    },
                    context: {
                      weight_kg: 75,
                      height_cm: 175,
                      derived_percentile: 50,
                      effective_percentile: 50,
                      can_percentile: null,
                      target_velocity_kmh: 40,
                      seatbelt_system: "SLL",
                      seat: "fl",
                      seat_x_mm: 100,
                      seat_x_source: "hmi_param",
                      seat_position_zone: "mid",
                      out_of_position: false,
                      candidates_found: 12
                    }
                  }
                }
              }
            },
            "400": { description: "Missing required parameters", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" }, example: { error: "weight is required", code: 3002, id: "VAL_MISSING_FIELD" } } } },
            "422": { description: "Invalid parameter values", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" }, example: { error: "Unknown seatbelt_system 'ACR'. Valid: SLL, CLL, MSLL", code: 3003, id: "VAL_OUT_OF_RANGE" } } } }
          }
        }
      },
      "/api/restraints/video/{filename}": {
        get: {
          tags: ["Restraints"],
          summary: "Stream matched restraints video",
          description: "Returns video file content from media/ by filename. Path traversal is blocked.",
          operationId: "getRestraintsVideo",
          parameters: [
            { name: "filename", in: "path", required: true, description: "Video file name", schema: { type: "string" }, example: "50p_mid_40_SLL.mp4" }
          ],
          responses: {
            "200": { description: "Video file stream" },
            "400": { description: "Invalid filename", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } },
            "404": { description: "Video not found", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        }
      }
    },
    components: {
      schemas: {
        SystemInfo: {
          type: "object",
          description: "Project and system metadata. Sensitive fields are redacted.",
          properties: {
            project:  { type: "object", properties: { name: { type: "string" }, version: { type: "string" }, environment: { type: "string" } } },
            server:   { type: "object", properties: { host: { type: "string" }, port: { type: "integer" }, api_key: { type: "string", example: "[REDACTED]" }, cors_origins: { type: "array", items: { type: "string" } }, websocket: { type: "object", properties: { endpoint: { type: "string" }, broadcast_interval_ms: { type: "integer" } } } } },
            hardware: { type: "object", properties: { can_bus: { type: "object", properties: { interface: { type: "string" }, bitrate: { type: "integer" }, retry_limit: { type: "integer" }, rate_limit_ms: { type: "integer" } } }, xcp: { type: "object" } } },
            storage:  { type: "object", properties: { db_path: { type: "string" }, log_level: { type: "string" }, retention_days: { type: "integer" } } },
            safety:   { type: "object", properties: { speed_limit_max: { type: "number" }, temp_threshold_critical: { type: "number" }, write_access_enabled: { type: "boolean" } } },
            video:    { type: "object" }
          }
        },
        Profile: {
          type: "object",
          properties: {
            name:         { type: "string",  example: "U0" },
            signals:      { type: "array", items: { type: "string" }, example: ["ARS_FL_InjuryRiskAdaptive","OMS_FL_HandsOnWheel"] },
            permission:   { type: "array", items: { type: "string" }, example: ["read"] },
            description:  { type: "string", nullable: true, example: "Front seat profile" },
            section_id:   { type: "string", example: "9ab1c2d3e4f5" }
          }
        },
        ProfileResponse: {
          type: "object",
          properties: {
            name:         { type: "string",  example: "U0" },
            signals:      { type: "array", items: { type: "string" }, example: ["ARS_FL_InjuryRiskAdaptive","OMS_FL_HandsOnWheel"] },
            permission:   { type: "array", items: { type: "string" }, example: ["full"] },
            description:  { type: "string", nullable: true, example: "Front seat profile" },
            section_id:   { type: "string", example: "9ab1c2d3e4f5" }
          }
        },
        ProfilesResponse: {
          type: "object",
          properties: {
            profiles:      { type: "array",   items: { $ref: "#/components/schemas/Profile" } },
            total:         { type: "integer", example: 2 },
            active:        { type: "string", nullable: true, example: "U0" },
            global_active: { type: "string", nullable: true, example: "U0" },
            client_id:     { type: "string", nullable: true, example: "client-abc123" }
          }
        },
        ProfileCreate: {
          type: "object",
          required: ["name"],
          properties: {
            name:         { type: "string" },
            signals:      { type: "array", items: { type: "string" } },
            permission:   { type: "array", items: { type: "string" }, example: ["read"] },
            description:  { type: "string", nullable: true }
          }
        },
        ProfileUpdate: {
          type: "object",
          required: ["section_id","name"],
          properties: {
            section_id:   { type: "string", description: "Must match the current profile section_id" },
            name:         { type: "string" },
            signals:      { type: "array", items: { type: "string" } },
            permission:   { type: "array", items: { type: "string" } },
            description:  { type: "string", nullable: true }
          }
        },
        Config: {
          type: "object",
          properties: {
            config_name:   { type: "string",  example: "high_load" },
            sampling_rate: { type: "integer", description: "Samples per second", example: 100 },
            RTSP_url:      { type: "string",  example: "rtsp://example.com/stream" },
            WebRTC_url:    { type: "string",  example: "" },
            db_file:       { type: "array", items: { type: "string" }, example: ["~/zf.dbc","~/mec.dbc"] },
            selected:      { type: "boolean", example: true }
          }
        },
        ConfigResponse: {
          type: "object",
          properties: {
            section_id:    { type: "integer", example: 123 },
            config_name:   { type: "string",  example: "high_load" },
            sampling_rate: { type: "integer", example: 100 },
            RTSP_url:      { type: "string",  example: "rtsp://example.com/stream" },
            WebRTC_url:    { type: "string",  example: "" },
            db_file:       { type: "array", items: { type: "string" }, example: ["~/zf.dbc"] },
            selected:      { type: "boolean", example: true }
          }
        },
        ConfigsResponse: {
          type: "object",
          properties: {
            section_id: { type: "integer", example: 123 },
            configs:    { type: "array",   items: { $ref: "#/components/schemas/Config" } }
          }
        },
        ConfigUpdate: {
          type: "object",
          required: ["section_id"],
          properties: {
            section_id:    { type: "integer", description: "Must match the current server section_id" },
            config_name:   { type: "string" },
            sampling_rate: { type: "integer" },
            RTSP_url:      { type: "string" },
            WebRTC_url:    { type: "string" },
            db_file:       { type: "array", items: { type: "string" } },
            selected:      { type: "boolean" }
          }
        },
        SignalState: {
          type: "object",
          properties: {
            value:       { type: "integer", example: 0 },
            description: { type: "string",  example: "Level 1" }
          }
        },
        SignalMeta: {
          type: "object",
          properties: {
            name:        { type: "string",  example: "ARS_FL_InjuryRiskAdaptive" },
            std_name:    { type: "string",  example: "ARS_FL_InjuryRiskAdaptive", description: "Standardized name alias from signal_std_name.json" },
            unit:        { type: "string",  example: "rpm" },
            min:         { type: "number",  example: 0 },
            max:         { type: "number",  example: 8000 },
            writable:    { type: "boolean", example: false },
            description: { type: "string",  example: "Engine speed in RPM" },
            states:      { type: "array",   items: { $ref: "#/components/schemas/SignalState" }, description: "Non-empty for enum/discrete signals" },
            value:       { type: "number",  nullable: true, description: "Current value (null if unavailable)", example: 3000 }
          }
        },
        SignalValue: {
          type: "object",
          properties: {
            signal_name: { type: "string", example: "ARS_FL_InjuryRiskAdaptive" },
            std_name:  { type: "string", example: "ARS_FL_InjuryRiskAdaptive", description: "Standardized name alias from signal_std_name.json" },
            value:     { type: "number", example: 3000 },
            unit:      { type: "string", nullable: true, example: "rpm" },
            timestamp: { type: "number", description: "Unix epoch seconds", example: 1717243200.123 }
          }
        },
        SignalsSnapshot: {
          type: "object",
          properties: {
            items:    { type: "array",  items: { $ref: "#/components/schemas/SignalValue" } },
            total:    { type: "integer", example: 167 },
            warnings: { type: "array", items: { type: "object" } }
          }
        },
        SignalsAvailableResponse: {
          type: "object",
          properties: {
            signals_info: { type: "array", items: { $ref: "#/components/schemas/SignalMeta" } }
          }
        },
        SignalWrite: {
          type: "object",
          required: ["name","value"],
          properties: {
            timestamp: { type: "string", format: "date-time" },
            name:      { type: "string", example: "ACR_FL_RetractRequest" },
            value:     { type: "number", example: 2 }
          }
        },
        BatchSignalWrite: {
          type: "object",
          required: ["signals"],
          properties: {
            signals: {
              type: "array",
              items: {
                type: "object",
                properties: {
                  signal_name: { type: "string", example: "ACR_FL_RetractRequest" },
                  value:       { type: "number", example: 2 }
                }
              }
            }
          }
        },
        Error: {
          type: "object",
          required: ["error"],
          properties: {
            error: { type: "string", example: "Signal 'X' not found" },
            code:  { type: "integer", example: 3004, description: "App-level error code (10xx System, 20xx Hardware, 30xx Validation, 40xx Safety/Security)" },
            id:    { type: "string",  example: "VAL_NOT_FOUND", description: "Human-readable error ID for logging and switch-case" }
          }
        },
        SignalWriteAccepted: {
          type: "object",
          properties: {
            signal_name: { type: "string",  example: "ACR_FL_RetractRequest" },
            std_name:    { type: "string",  example: "ACR_FL_RetractRequest" },
            value:       { type: "number",  example: 2 },
            queued_at:   { type: "number",  description: "Unix epoch seconds", example: 1717243200.123 }
          }
        },
        BatchSignalWriteAccepted: {
          type: "object",
          properties: {
            queued: { type: "array", items: {
              type: "object",
              properties: {
                signal_name: { type: "string", example: "ACR_FL_RetractRequest" },
                value:       { type: "number", example: 2 }
              }
            }},
            count:     { type: "integer", example: 2 },
            queued_at: { type: "number",  description: "Unix epoch seconds", example: 1716451200.789 },
            errors:    { type: "array", items: {
              type: "object",
              properties: {
                signal_name: { type: "string", example: "ARS_FL_InjuryRiskAdaptive" },
                value:       { type: "number", example: 1 },
                error:       { type: "string", enum: ["not_writable","not_found","out_of_range"], example: "not_writable" }
              }
            }}
          }
        },
        RestraintsMatchResponse: {
          type: "object",
          properties: {
            matched: { type: "boolean", example: true },
            video:   { $ref: "#/components/schemas/VideoMatch" },
            score:   { type: "number",  description: "Best candidate score in range 0.0–7.0", example: 6.952 },
            context: { type: "object", description: "Matching context used by backend" }
          }
        },
        VideoMatch: {
          type: "object",
          properties: {
            filename:      { type: "string",  description: "Matched media filename", example: "50p_mid_40_SLL.mp4" },
            percentile:    { type: "integer", enum: [5, 50, 95], example: 50 },
            seat_position: { type: "string",  enum: ["front","mid","rear"], example: "mid" },
            velocity_kmh:  { type: "integer", enum: [35, 40, 50, 56], example: 40 },
            seatbelt:      { type: "string",  enum: ["CLL","SLL","MSLL"], example: "SLL" },
            url:           { type: "string",  description: "URL path to retrieve the video file", example: "/api/restraints/video/50p_mid_40_SLL.mp4" }
          }
        },
        ConflictError: {
          type: "object",
          properties: {
            error:              { type: "string",  example: "section_id mismatch: expected 124, got 123" },
            current_section_id: { type: "integer", example: 124 }
          }
        }
      }
    }
  };

  SwaggerUIBundle({
    spec,
    dom_id: "#swagger-ui",
    deepLinking: true,
    presets: [
      SwaggerUIBundle.presets.apis,
      SwaggerUIStandalonePreset
    ],
    plugins: [SwaggerUIBundle.plugins.DownloadUrl],
    layout: "StandaloneLayout",
    tryItOutEnabled: false,
    defaultModelsExpandDepth: 1,
    defaultModelExpandDepth: 2
  });
};
</script>
</body>
</html>
