<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAN-HMI API - Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fafafa; }
    .app-header {
      background: #0f1117;
      color: #e2e8f0;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 2px solid #2e3248;
      font-family: "Inter", system-ui, sans-serif;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .app-header .logo { font-size: 17px; font-weight: 700; }
    .app-header .tag {
      font-size: 10px;
      background: #232635;
      border: 1px solid #2e3248;
      padding: 2px 8px;
      border-radius: 4px;
      color: #6b7280;
    }
    .app-header nav { margin-left: auto; display: flex; gap: 20px; align-items: center; }
    .app-header nav a { color: #4f8ef7; font-size: 13px; text-decoration: none; }
    .app-header nav a:hover { text-decoration: underline; }
    .swagger-ui .topbar { display: none; }
    .swagger-ui .information-container.wrapper { padding: 20px 30px 0; }
    .swagger-ui .scheme-container { padding: 10px 30px; }
  </style>
</head>
<body>

<header class="app-header">
  <span class="logo">&#x1F697; CAN-HMI</span>
  <span class="tag">API v1.0</span>
  <nav>
    <a href="/">&#8592; Demo</a>
    <a href="/ws">WebSocket Docs &#8599;</a>
    <a href="/docs/errors">Error Codes &#8599;</a>
  </nav>
</header>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
<script>
window.onload = function () {
  const spec = {
    openapi: "3.0.3",
    info: {
      title: "CAN-HMI REST API",
      description: "REST + WebSocket contract cho Car HMI demo.\n\n**WebSocket realtime stream:** `wss://car-hmi-api-demo.onrender.com/ws/signals` - xem [WebSocket Docs](/ws).\n\n---\n\n### HTTP Status Codes\n\n| HTTP | App Code | ID | Mô tả |\n|------|----------|----|-------|\n| `200 OK` | - | - | Thành công |\n| `201 Created` | - | - | POST /api/profile tạo mới |\n| `202 Accepted` | - | - | Signal write đã queue gửi CAN |\n| `204 No Content` | - | - | DELETE thành công |\n| `400 Bad Request` | `3001` `3002` | VAL_INVALID_JSON / VAL_MISSING_FIELD | JSON sai / thiếu field |\n| `401 Unauthorized` | `4001` | SEC_UNAUTHORIZED | API Key không hợp lệ |\n| `403 Forbidden` | `4002` `4004` | SAFE_WRITE_DENIED / SAFE_VEHICLE_MOVING | Signal read-only / xe đang chạy |\n| `404 Not Found` | `3004` | VAL_NOT_FOUND | Resource không tồn tại |\n| `409 Conflict` | `3005` | VAL_CONFLICT | Tên trùng / section_id mismatch |\n| `422 Unprocessable` | `3003` | VAL_OUT_OF_RANGE | Value ngoài [min, max] |\n| `500 Server Error` | `1000` `4003` | SYS_UNKNOWN / SAFE_WATCHDOG_TRIP | Lỗi nội bộ |\n| `503 Unavailable` | `1001` `2001` | SYS_DB_LOCKED / HW_CAN_ERROR | DB locked / hardware |\n| `504 Timeout` | `2002` | HW_XCP_TIMEOUT | ECU XCP timeout |\n\nXem đầy đủ tại **[Error Codes Reference](/docs/errors)**.\n\n---\n\n### section_id (Optimistic Locking)\nMỗi PUT request phải kèm `section_id` khớp với giá trị hiện tại của server.\nNếu không khớp → **409 / VAL_CONFLICT** → client GET lại rồi retry.",,
      version: "1.0.0",
      contact: { url: "https://car-hmi-api-demo.onrender.com" }
    },
    servers: [
      { url: "https://car-hmi-api-demo.onrender.com", description: "Production (Render)" },
      { url: "http://localhost:8000",        description: "Local Dev" }
    ],
    tags: [
      { name: "System",   description: "Project info and system metadata (read-only)" },
      { name: "Profiles", description: "User profile management - which signals to show per user" },
      { name: "Config",   description: "System configuration: sampling rate, RTSP/WebRTC URLs. Dev mode only." },
      { name: "Signals",  description: "Read CAN signal values and write writable signals" }
    ],
    paths: {
      "/api/info": {
        get: {
          tags: ["System"],
          summary: "Get project & system information",
          description: "Returns read-only metadata: project version, server config, hardware settings, storage and safety thresholds. Sensitive fields (api_key) are redacted.",
          operationId: "getInfo",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/SystemInfo" },
                  example: {
                    project: { name: "CarPC HMI System", version: "1.2.0", environment: "development" },
                    server: { host: "0.0.0.0", port: 8000, api_key: "[REDACTED]", cors_origins: ["http://localhost:3000"], websocket: { endpoint: "/ws/signals", broadcast_interval_ms: 100 } },
                    hardware: { can_bus: { interface: "vcan0", bitrate: 500000, retry_limit: 3, rate_limit_ms: 100 } },
                    storage: { log_level: "DEBUG", retention_days: 30 },
                    safety: { speed_limit_max: 200, temp_threshold_critical: 105, write_access_enabled: true }
                  }
                }
              }
            },
            "503": { description: "Service Unavailable - info not loaded yet", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        }
      },
      "/api/profiles": {
        get: {
          tags: ["Profiles"],
          summary: "Lay danh sach tat ca profiles",
          description: "Returns all stored user profiles.",
          operationId: "getProfiles",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/ProfilesResponse" },
                  example: {
                    section_id: 123,
                    profiles: [
                      { profile_name: "U0", signals: ["EngineSpeed","CoolantTemp","HB_FL_ActivationLevel"], selected: true },
                      { profile_name: "U1", signals: ["EngineSpeed","CoolantTemp"], selected: false }
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "/api/profile": {
        get: {
          tags: ["Profiles"],
          summary: "Lay profile theo ten (hoac active profile)",
          operationId: "getProfile",
          parameters: [
            { name: "name", in: "query", required: false,
              description: "Profile name. Bo trong de lay active profile.",
              schema: { type: "string", example: "U0" } }
          ],
          responses: {
            "200": { description: "OK", content: { "application/json": { schema: { $ref: "#/components/schemas/ProfileResponse" } } } },
            "404": { description: "Not found", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        },
        post: {
          tags: ["Profiles"],
          summary: "Tao moi profile",
          operationId: "createProfile",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/ProfileCreate" },
                example: { profile_name: "U2", signals: ["EngineSpeed","HB_FL_ActivationLevel"], selected: false }
              }
            }
          },
          responses: {
            "201": { description: "Created", content: { "application/json": { schema: { $ref: "#/components/schemas/ProfileResponse" } } } },
            "409": { description: "Profile name already exists", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        },
        put: {
          tags: ["Profiles"],
          summary: "Cap nhat profile (optimistic lock)",
          description: "Yeu cau `section_id` khop voi gia tri hien tai cua server.",
          operationId: "updateProfile",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/ProfileUpdate" },
                example: { section_id: 123, profile_name: "U0", signals: ["EngineSpeed","CoolantTemp","HB_FL_ActivationLevel"], selected: true }
              }
            }
          },
          responses: {
            "200": { description: "Updated", content: { "application/json": { schema: { $ref: "#/components/schemas/ProfileResponse" } } } },
            "409": { description: "section_id mismatch", content: { "application/json": { schema: { $ref: "#/components/schemas/ConflictError" } } } }
          }
        }
      },
      "/api/profile/{name}": {
        delete: {
          tags: ["Profiles"],
          summary: "Xoa profile",
          operationId: "deleteProfile",
          parameters: [
            { name: "name", in: "path", required: true, schema: { type: "string" }, example: "U0" }
          ],
          responses: {
            "204": { description: "Deleted (no body)" },
            "404": { description: "Not found", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        }
      },
      "/configs": {
        get: {
          tags: ["Config"],
          summary: "Lay tat ca configs (Dev mode)",
          operationId: "getConfigs",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/ConfigsResponse" },
                  example: {
                    section_id: 123,
                    configs: [
                      { config_name: "high_load", sampling_rate: 100, RTSP_url: "rtsp://example.com/stream", WebRTC_url: "", db_file: ["~/zf.dbc","~/mec.dbc"], selected: true },
                      { config_name: "low_load",  sampling_rate: 10,  RTSP_url: "", WebRTC_url: "", db_file: [], selected: false }
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "/config": {
        get: {
          tags: ["Config"],
          summary: "Lay active config (Dev mode)",
          operationId: "getConfig",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/ConfigResponse" },
                  example: { section_id: 123, config_name: "high_load", sampling_rate: 100, RTSP_url: "rtsp://example.com/stream", WebRTC_url: "", db_file: ["~/zf.dbc","~/mec.dbc"], selected: true }
                }
              }
            }
          }
        },
        put: {
          tags: ["Config"],
          summary: "Cap nhat config (optimistic lock, Dev mode)",
          description: "Yeu cau `section_id` khop voi gia tri hien tai cua server.",
          operationId: "updateConfig",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/ConfigUpdate" },
                example: { section_id: 123, config_name: "high_load", sampling_rate: 50, RTSP_url: "rtsp://example.com/stream", WebRTC_url: "", db_file: ["~/zf.dbc"], selected: true }
              }
            }
          },
          responses: {
            "200": { description: "Updated", content: { "application/json": { schema: { $ref: "#/components/schemas/ConfigResponse" } } } },
            "409": { description: "section_id mismatch", content: { "application/json": { schema: { $ref: "#/components/schemas/ConflictError" } } } }
          }
        }
      },
      "/signals": {
        get: {
          tags: ["Signals"],
          summary: "Snapshot gia tri hien tai cua tat ca signals",
          description: "One-time snapshot. Dung cho initial load; sau do dung **WebSocket** `/ws/signals` de nhan updates realtime.",
          operationId: "getSignals",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/SignalsSnapshot" },
                  example: {
                    timestamp: "2024-06-01T12:00:00.123Z",
                    signals: [
                      { name: "EngineSpeed",           value: 3000,  timestamp: 1717243200.123 },
                      { name: "CoolantTemp",            value: 90,    timestamp: 1717243200.123 },
                      { name: "HB_FL_ActivationLevel",  value: 2,     timestamp: 1717243200.123 },
                      { name: "HB_FR_ActivationLevel",  value: 0,     timestamp: 1717243200.123 },
                      { name: "BrakePressure",          value: 45.5,  timestamp: 1717243200.123 },
                      { name: "BatteryVoltage",         value: 12.6,  timestamp: 1717243200.123 },
                      { name: "FuelLevel",              value: 68,    timestamp: 1717243200.123 }
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "/signals/available": {
        get: {
          tags: ["Signals"],
          summary: "Full metadata cua tat ca signals",
          description: "Tra ve metadata day du: unit, min, max, writable flag, states enum, gia tri hien tai. Goi **mot lan** khi khoi dong app.",
          operationId: "getSignalsAvailable",
          responses: {
            "200": {
              description: "OK",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/SignalsAvailableResponse" },
                  example: {
                    signals_info: [
                      { name: "EngineSpeed",           unit: "rpm", min: 0, max: 8000, writable: false, description: "Engine speed in RPM",              states: [], value: 3000  },
                      { name: "CoolantTemp",            unit: "C",   min: 0, max: 120,  writable: false, description: "Coolant temperature",              states: [], value: 90    },
                      { name: "HB_FL_ActivationLevel",  unit: "",    min: 0, max: 7,    writable: true,  description: "HB Front-Left Activation Level",   states: [{value:0,description:"Level 1"},{value:1,description:"Level 2"},{value:2,description:"Level 3"},{value:3,description:"Level 4"},{value:4,description:"Level 5"},{value:5,description:"Level 6"},{value:6,description:"Level 7"},{value:7,description:"Level 8"}], value: 2 },
                      { name: "HB_FR_ActivationLevel",  unit: "",    min: 0, max: 7,    writable: true,  description: "HB Front-Right Activation Level",  states: [{value:0,description:"Level 1"},{value:1,description:"Level 2"},{value:2,description:"Level 3"},{value:3,description:"Level 4"},{value:4,description:"Level 5"},{value:5,description:"Level 6"},{value:6,description:"Level 7"},{value:7,description:"Level 8"}], value: 0 },
                      { name: "BrakePressure",          unit: "bar", min: 0, max: 200,  writable: false, description: "Brake line pressure",              states: [], value: 45.5 },
                      { name: "BatteryVoltage",         unit: "V",   min: 9, max: 16,   writable: false, description: "12V battery voltage",              states: [], value: 12.6 },
                      { name: "FuelLevel",              unit: "%",   min: 0, max: 100,  writable: false, description: "Fuel level percentage",            states: [], value: 68   }
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "/signals/batch_update": {
        post: {
          tags: ["Signals"],
          summary: "Ghi dong thoi nhieu writable signals (batch)",
          description: "Bulk write - dong bo nhieu writable signals trong mot request.",
          operationId: "batchUpdateSignals",
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/BatchSignalWrite" },
                example: {
                  timestamp: "2024-06-01T12:00:00Z",
                  updates: [
                    { name: "HB_FL_ActivationLevel", value: 3 },
                    { name: "HB_FR_ActivationLevel", value: 5 }
                  ]
                }
              }
            }
          },
          responses: {
            "202": {
              description: "Accepted - tất cả signals đã được queue",
              content: {
                "application/json": {
                  schema: { $ref: "#/components/schemas/BatchSignalWriteAccepted" },
                  example: { status: "queued", count: 2, results: [ { name: "HB_FL_ActivationLevel", value: 3, status: "ok" }, { name: "SomeSensor", value: 1, status: "not_writable" } ] }
                }
              }
            },
            "400": { description: "Bad Request - thiếu trường `updates` hoặc sai định dạng", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" } } } }
          }
        }
      },
      "/signals/{signal_name}": {
        put: {
          tags: ["Signals"],
          summary: "Ghi gia tri cho mot writable signal",
          description: "Forward toi CAN writer. Chi ap dung cho signals co `writable: true`:\n- `HB_FL_ActivationLevel` (0-7)\n- `HB_FR_ActivationLevel` (0-7)",
          operationId: "updateSignal",
          parameters: [
            { name: "signal_name", in: "path", required: true,
              schema: { type: "string", enum: ["HB_FL_ActivationLevel","HB_FR_ActivationLevel"] },
              example: "HB_FL_ActivationLevel" }
          ],
          requestBody: {
            required: true,
            content: {
              "application/json": {
                schema: { $ref: "#/components/schemas/SignalWrite" },
                example: { timestamp: "2024-06-01T12:00:00Z", name: "HB_FL_ActivationLevel", value: 3 }
              }
            }
          },
          responses: {
            "202": { description: "Accepted - signal queued for CAN write", content: { "application/json": { schema: { $ref: "#/components/schemas/SignalWriteAccepted" }, example: { signal_name: "HB_FL_ActivationLevel", value: 3, queued_at: 1717243200.123 } } } },
            "403": { description: "Forbidden - signal is read-only (TX: false)", content: { "application/json": { schema: { $ref: "#/components/schemas/Error" }, example: { error: "Not writable" } } } },
            "404": { description: "Signal not found",             content: { "application/json": { schema: { $ref: "#/components/schemas/Error" }, example: { error: "Not found" } } } }
          }
        }
      }
    },
    components: {
      schemas: {
        SystemInfo: {
          type: "object",
          description: "Project and system metadata. Sensitive fields are redacted.",
          properties: {
            project:  { type: "object", properties: { name: { type: "string" }, version: { type: "string" }, environment: { type: "string" } } },
            server:   { type: "object", properties: { host: { type: "string" }, port: { type: "integer" }, api_key: { type: "string", example: "[REDACTED]" }, cors_origins: { type: "array", items: { type: "string" } }, websocket: { type: "object", properties: { endpoint: { type: "string" }, broadcast_interval_ms: { type: "integer" } } } } },
            hardware: { type: "object", properties: { can_bus: { type: "object", properties: { interface: { type: "string" }, bitrate: { type: "integer" }, retry_limit: { type: "integer" }, rate_limit_ms: { type: "integer" } } }, xcp: { type: "object" } } },
            storage:  { type: "object", properties: { db_path: { type: "string" }, log_level: { type: "string" }, retention_days: { type: "integer" } } },
            safety:   { type: "object", properties: { speed_limit_max: { type: "number" }, temp_threshold_critical: { type: "number" }, write_access_enabled: { type: "boolean" } } },
            video:    { type: "object" }
          }
        },
        Profile: {
          type: "object",
          properties: {
            profile_name: { type: "string",  example: "U0" },
            signals:      { type: "array", items: { type: "string" }, example: ["EngineSpeed","CoolantTemp"] },
            selected:     { type: "boolean", example: false }
          }
        },
        ProfileResponse: {
          type: "object",
          properties: {
            section_id:   { type: "integer", example: 123 },
            profile_name: { type: "string",  example: "U0" },
            signals:      { type: "array", items: { type: "string" }, example: ["EngineSpeed","CoolantTemp"] },
            selected:     { type: "boolean", example: true }
          }
        },
        ProfilesResponse: {
          type: "object",
          properties: {
            section_id: { type: "integer", example: 123 },
            profiles:   { type: "array",   items: { $ref: "#/components/schemas/Profile" } }
          }
        },
        ProfileCreate: {
          type: "object",
          required: ["profile_name"],
          properties: {
            profile_name: { type: "string" },
            signals:      { type: "array", items: { type: "string" } },
            selected:     { type: "boolean", default: false }
          }
        },
        ProfileUpdate: {
          type: "object",
          required: ["section_id","profile_name"],
          properties: {
            section_id:   { type: "integer", description: "Phai khop voi section_id hien tai cua server" },
            profile_name: { type: "string" },
            signals:      { type: "array", items: { type: "string" } },
            selected:     { type: "boolean" }
          }
        },
        Config: {
          type: "object",
          properties: {
            config_name:   { type: "string",  example: "high_load" },
            sampling_rate: { type: "integer", description: "Samples per second", example: 100 },
            RTSP_url:      { type: "string",  example: "rtsp://example.com/stream" },
            WebRTC_url:    { type: "string",  example: "" },
            db_file:       { type: "array", items: { type: "string" }, example: ["~/zf.dbc","~/mec.dbc"] },
            selected:      { type: "boolean", example: true }
          }
        },
        ConfigResponse: {
          type: "object",
          properties: {
            section_id:    { type: "integer", example: 123 },
            config_name:   { type: "string",  example: "high_load" },
            sampling_rate: { type: "integer", example: 100 },
            RTSP_url:      { type: "string",  example: "rtsp://example.com/stream" },
            WebRTC_url:    { type: "string",  example: "" },
            db_file:       { type: "array", items: { type: "string" }, example: ["~/zf.dbc"] },
            selected:      { type: "boolean", example: true }
          }
        },
        ConfigsResponse: {
          type: "object",
          properties: {
            section_id: { type: "integer", example: 123 },
            configs:    { type: "array",   items: { $ref: "#/components/schemas/Config" } }
          }
        },
        ConfigUpdate: {
          type: "object",
          required: ["section_id"],
          properties: {
            section_id:    { type: "integer", description: "Phai khop voi section_id hien tai cua server" },
            config_name:   { type: "string" },
            sampling_rate: { type: "integer" },
            RTSP_url:      { type: "string" },
            WebRTC_url:    { type: "string" },
            db_file:       { type: "array", items: { type: "string" } },
            selected:      { type: "boolean" }
          }
        },
        SignalState: {
          type: "object",
          properties: {
            value:       { type: "integer", example: 0 },
            description: { type: "string",  example: "Level 1" }
          }
        },
        SignalMeta: {
          type: "object",
          properties: {
            name:        { type: "string",  example: "EngineSpeed" },
            unit:        { type: "string",  example: "rpm" },
            min:         { type: "number",  example: 0 },
            max:         { type: "number",  example: 8000 },
            writable:    { type: "boolean", example: false },
            description: { type: "string",  example: "Engine speed in RPM" },
            states:      { type: "array",   items: { $ref: "#/components/schemas/SignalState" }, description: "Non-empty for enum/discrete signals" },
            value:       { type: "number",  nullable: true, description: "Current value (null if unavailable)", example: 3000 }
          }
        },
        SignalValue: {
          type: "object",
          properties: {
            name:      { type: "string", example: "EngineSpeed" },
            value:     { type: "number", example: 3000 },
            timestamp: { type: "number", description: "Unix epoch seconds", example: 1717243200.123 }
          }
        },
        SignalsSnapshot: {
          type: "object",
          properties: {
            timestamp: { type: "string", format: "date-time", example: "2024-06-01T12:00:00.123Z" },
            signals:   { type: "array",  items: { $ref: "#/components/schemas/SignalValue" } }
          }
        },
        SignalsAvailableResponse: {
          type: "object",
          properties: {
            signals_info: { type: "array", items: { $ref: "#/components/schemas/SignalMeta" } }
          }
        },
        SignalWrite: {
          type: "object",
          required: ["name","value"],
          properties: {
            timestamp: { type: "string", format: "date-time" },
            name:      { type: "string", example: "HB_FL_ActivationLevel" },
            value:     { type: "number", example: 3 }
          }
        },
        BatchSignalWrite: {
          type: "object",
          required: ["updates"],
          properties: {
            timestamp: { type: "string", format: "date-time" },
            updates: {
              type: "array",
              items: {
                type: "object",
                properties: {
                  name:  { type: "string", example: "HB_FL_ActivationLevel" },
                  value: { type: "number", example: 3 }
                }
              }
            }
          }
        },
        Error: {
          type: "object",
          required: ["error"],
          properties: {
            error: { type: "string", example: "Signal 'X' not found" },
            code:  { type: "integer", example: 3004, description: "App-level error code (10xx System, 20xx Hardware, 30xx Validation, 40xx Safety/Security)" },
            id:    { type: "string",  example: "VAL_NOT_FOUND", description: "Human-readable error ID for logging and switch-case" }
          }
        },
        SignalWriteAccepted: {
          type: "object",
          properties: {
            signal_name: { type: "string",  example: "HB_FL_ActivationLevel" },
            value:       { type: "number",  example: 3 },
            queued_at:   { type: "number",  description: "Unix epoch seconds", example: 1717243200.123 }
          }
        },
        BatchSignalWriteAccepted: {
          type: "object",
          properties: {
            status:  { type: "string",  example: "queued" },
            count:   { type: "integer", example: 2 },
            results: { type: "array", items: {
              type: "object",
              properties: {
                name:   { type: "string", example: "HB_FL_ActivationLevel" },
                value:  { type: "number", example: 3 },
                status: { type: "string", enum: ["ok","not_writable","not_found","out_of_range"], example: "ok" }
              }
            }}
          }
        },
        ConflictError: {
          type: "object",
          properties: {
            error:              { type: "string",  example: "section_id mismatch: expected 124, got 123" },
            current_section_id: { type: "integer", example: 124 }
          }
        }
      }
    }
  };

  SwaggerUIBundle({
    spec,
    dom_id: "#swagger-ui",
    deepLinking: true,
    presets: [
      SwaggerUIBundle.presets.apis,
      SwaggerUIStandalonePreset
    ],
    plugins: [SwaggerUIBundle.plugins.DownloadUrl],
    layout: "StandaloneLayout",
    tryItOutEnabled: false,
    defaultModelsExpandDepth: 1,
    defaultModelExpandDepth: 2
  });
};
</script>
</body>
</html>
